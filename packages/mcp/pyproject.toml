[project]
name = "ontoloom-mcp"
version = "0.1.0"
description = "MCP server for ontoloom ontology tools"
requires-python = "==3.12.*"
authors = [{ name = "ExtensityAI" }]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = ["fastmcp>=3.1.1", "ontoloom"]


[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
ontoloom = { workspace = true }
