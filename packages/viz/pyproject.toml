[project]
name = "ontoloom-viz"
version = "0.1.0"
description = "Web visualization server for ontoloom runs"
readme = "README.md"
requires-python = "==3.12.*"
authors = [{ name = "ExtensityAI" }]
keywords = ["ontology", "visualization"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = ["ontoloom", "litestar[standard]>=2.0.0", "uvicorn>=0.30.0"]

[project.scripts]
ontoloom-viz = "ontoloom_viz.cli:main"

[build-system]
requires = ["uv_build>=0.9.26,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
ontoloom = { workspace = true }
