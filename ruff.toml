extend-exclude = [
    ".codex",
    ".symai",
    ".ipynb_checkpoints",
    ".pytest_cache",
    ".vscode",
    "build",
    "site-packages",
    "**/_generated.py",
]
force-exclude = true

line-length = 100
indent-width = 4
target-version = "py312"
required-version = ">=0.15.0,<0.16.0"

[lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "C4",
    "A",
    "ARG",
    "ISC",
    "RET",
    "RSE",
    "EM",
    "G",
    "LOG",
    "TC",
    "PTH",
    "DTZ",
    "C90",
    "N",
    "PIE",
    "PERF",
    "BLE",
    "T20",
    "ASYNC",
    "RUF",
]
extend-select = ["B912", "RUF039", "RUF047"]
preview = true
explicit-preview-rules = true
ignore = ["TC001", "TC002", "TC003"]

logger-objects = ["loguru.logger"]


# Rules URL: https://docs.astral.sh/ruff/rules
# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"


mccabe.max-complexity = 10

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
